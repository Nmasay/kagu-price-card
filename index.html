<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500&display=swap" rel="stylesheet">

    <title>プライスカード作成ツール</title>
    <link rel="stylesheet" href="style.css">
    <!-- JsBarcodeライブラリをCDNから読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 左カラム（元右カラム）：入力フォーム -->
        <form id="input-form">
            <div class="form-group">
                <label for="title">商品タイトル:</label>
                <div class="title-input-container">
                    <textarea id="product-title" name="product-title" rows="2"></textarea>
                    <div id="title-history-list" class="history-list"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="title-font-size">タイトル文字サイズ (px):</label>
                <input type="range" id="title-font-size" value="50" min="10" max="50">
                <span id="title-font-size-value">50</span> px
            </div>
            <div class="form-group">
                <label for="condition">状態:</label>
                <select id="condition">
                    <option value="中古">中古</option>
                    <option value="新品">新品</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notes">備考:</label>
                <div class="notes-input-container"> 
                    <textarea id="notes" rows="2" placeholder="備考"></textarea>
                    <div id="notes-history-list" class="history-list" style="display: none;"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="notes-font-size">備考 文字サイズ (px):</label>
                <input type="range" id="notes-font-size" value="20" min="8" max="30">
                <span id="notes-font-size-value">14</span> px
            </div>
            <div class="form-group">
                <label for="delivery-options">配送オプション:</label>
                <select id="delivery-options">
                    <option value="預かり可能(１週間)又は配達可能(有料)">預かり可能(１週間)又は配達可能(有料)</option>
                    <option value="配達不可(預かりのみ可能)">配達不可(預かりのみ可能)</option>
                    <option value="本日もお持ち帰りのみ可能">本日お持ち帰りのみ可能</option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">金額 (税込):</label>
                <input type="number" id="price" placeholder="税込金額を入力"value="" min="0">
            </div>
            <div class="form-actions" style="display: flex; gap: 8px; width: 100%;">
                <button type="button" id="add-to-list-button" class="action-button secondary-button" style="flex: 1; padding: 10px 0; font-size: 14px; width: auto;">リストに追加</button>
                <button type="button" id="print-button" class="action-button primary-button" style="flex: 1; padding: 10px 0; font-size: 14px; width: auto;">この1枚を印刷</button>
                <button type="button" id="clear-form-button" class="action-button danger-button" style="flex: 0 0 50px; padding: 10px 0; display: flex; align-items: center; justify-content: center; width: auto;" title="フォームをクリア">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                        <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                    </svg>
                </button>
            </div>
        </form>

        <!-- 右カラム（元左カラム）：プレビューとリスト -->
        <div class="preview-column">
            <div id="preview-container">
            <!-- プレビューエリア -->
            <div id="price-card" class="price-card-template">
                <div id="preview-stamp" class="card-stamp"></div>
                <div class="card-row title-row" id="preview-title">商品タイトル</div>
                <div class="card-row condition-row" id="preview-condition">中古</div>
                <div class="card-row notes-row" id="preview-notes"></div>
                <div class="card-row preview-delivery-options" id="preview-delivery-options"></div>
                <div class="card-row price-row" id="preview-price">¥1,000</div>
                <svg id="barcode" class="barcode-svg"></svg>
        
                <!-- ダメージマップ表示領域 -->
                <div id="preview-damage-map" class="damage-map-container"></div>
        
                <div id="check-section" class="check-section">
                    <div class="check-item">接客者: ＿＿＿＿＿</div>
                    <div class="check-item">売約:　　 □</div>
                    <div class="check-item">持ち帰り: □</div>
                    <div class="check-item">配達: 　　□</div>
                    <div class="check-item">日付: 　　/　　</div>
                </div>

                <div id="timestamp" class="timestamp-div"></div>
            </div>
            </div>

            <!-- スタンプ選択パネル -->
            <div class="stamp-controls-panel" style="background: var(--bg-overlay); padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
                <h4 style="margin-top: 0; margin-bottom: 10px; font-size: 14px;">🎯 スタンプ追加（左上角）</h4>
                <div class="stamp-buttons" style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button type="button" class="stamp-btn clear-stamp-btn" data-stamp="" style="background-color: #f8f9fa; color: #333; border: 1px solid #ccc;">🚫 なし</button>
                    <button type="button" class="stamp-btn" data-stamp="NEW">NEW</button>
                    <button type="button" class="stamp-btn" data-stamp="値下げ!">値下げ!</button>
                    <button type="button" class="stamp-btn" data-stamp="美品">美品</button>
                    <button type="button" class="stamp-btn" data-stamp="現品限り">現品限り</button>
                    <input type="text" id="custom-stamp-input" placeholder="自由入力(6文字まで)" maxlength="6" style="padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; width: 130px; margin-left: 10px;">
                </div>
            </div>

            <!-- ダメージマップ選択パネル -->
            <div class="damage-map-controls-panel" style="background: var(--bg-overlay); padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-top: 15px;">
                <h4 style="margin-top: 0; margin-bottom: 10px; font-size: 14px;">🪑 ダメージマップ（キズの場所）</h4>
                <select id="damage-map-select" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px;">
                    <option value="">🚫 なし</option>
                    <option value="sofa">🛋️ ソファ</option>
                    <option value="chair">🪑 チェア</option>
                    <option value="table">🟫 テーブル</option>
                    <option value="cabinet_tall">🪟 縦長キャビネット</option>
                    <option value="cabinet_wide">📺 横長キャビネット</option>
                    <option value="cupboard">🍽️ 食器棚</option>
                    <option value="bed">🛏️ ベッド</option>
                    <option value="color_box">🗄️ カラーボックス</option>
                </select>
            </div>
        </div>

        <!-- 右カラム（新）：印刷待ちリストエリア -->
        <div id="print-queue-section" class="queue-section">
            <div class="queue-header">
                <h3>印刷待ち (<span id="queue-count">0</span>件)</h3>
                <label class="select-all-label">
                    <input type="checkbox" id="select-all-checkbox" checked> 全選択
                </label>
            </div>
            <div class="queue-import" style="margin-bottom: 10px;">
                <input type="file" id="csv-file-input" accept=".csv" style="display: none;">
                <button type="button" id="import-csv-button" class="action-button" style="width: 100%; background-color: #6c757d; color: white;">📁 CSV一括読み込み</button>
            </div>
            <div class="queue-actions">
                <button type="button" id="batch-print-button" class="action-button primary-button" disabled>選択項目を印刷</button>
                <button type="button" id="clear-queue-button" class="action-button danger-button" disabled>リストをクリア</button>
            </div>
            <ul id="print-queue-list"></ul>
        </div>
    </div>

    <div id="print-batch-container"></div>

    <script src="script.js"></script>
</body>
</html>
