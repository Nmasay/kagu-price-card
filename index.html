<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500&display=swap" rel="stylesheet">

    <title>プライスカード作成ツール</title>
    <link rel="stylesheet" href="style.css">
    <!-- JsBarcodeライブラリをCDNから読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="logo-container">
            <img src="images/logo.png" alt="サイトロゴ" class="site-logo">
        </div>
        <h1 class="site-title">家具プライス</h1>
    </header>
    <div class="container">
        <!-- 左カラム（元右カラム）：入力フォーム -->
        <form id="input-form">
            <div class="form-group">
                <label for="title">商品タイトル:</label>
                <div class="title-input-container">
                    <textarea id="product-title" name="product-title" rows="2"></textarea>
                    <div id="title-history-list" class="history-list"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="title-font-size">タイトル文字サイズ (px):</label>
                <input type="range" id="title-font-size" value="50" min="10" max="50">
                <span id="title-font-size-value">50</span> px
            </div>
            <div class="form-group">
                <label for="condition">状態:</label>
                <select id="condition">
                    <option value="中古">中古</option>
                    <option value="新品">新品</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notes">備考:</label>
                <div class="notes-input-container"> 
                    <textarea id="notes" rows="2" placeholder="備考"></textarea>
                    <div id="notes-history-list" class="history-list" style="display: none;"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="notes-font-size">備考 文字サイズ (px):</label>
                <input type="range" id="notes-font-size" value="20" min="8" max="30">
                <span id="notes-font-size-value">14</span> px
            </div>
            <div class="form-group">
                <label for="delivery-options">配送オプション:</label>
                <select id="delivery-options">
                    <option value="預かり可能(１週間)又は配達可能(有料)">預かり可能(１週間)又は配達可能(有料)</option>
                    <option value="配達不可(預かりのみ可能)">配達不可(預かりのみ可能)</option>
                    <option value="本日もお持ち帰りのみ可能">本日お持ち帰りのみ可能</option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">金額 (税込):</label>
                <input type="number" id="price" placeholder="税込金額を入力"value="" min="0">
            </div>
            <div class="form-actions">
                <button type="button" id="add-to-list-button" class="action-button secondary-button">リストに追加</button>
                <button type="button" id="print-button" class="action-button primary-button">この1枚を印刷</button>
            </div>
        </form>

        <!-- 右カラム（元左カラム）：プレビューとリスト -->
        <div class="preview-column">
            <div id="preview-container">
            <!-- プレビューエリア -->
            <div id="price-card" class="price-card-template">
                <div class="card-row title-row" id="preview-title">商品タイトル</div>
                <div class="card-row condition-row" id="preview-condition">中古</div>
                <div class="card-row notes-row" id="preview-notes"></div>
                <div class="card-row preview-delivery-options" id="preview-delivery-options"></div>
                <div class="card-row price-row" id="preview-price">¥1,000</div>
                <svg id="barcode" class="barcode-svg"></svg>
        
                <div id="check-section" class="check-section">
                    <div class="check-item">接客者: ＿＿＿＿＿</div>
                    <div class="check-item">売約:　　 □</div>
                    <div class="check-item">持ち帰り: □</div>
                    <div class="check-item">配達: 　　□</div>
                    <div class="check-item">日付: 　　/　　</div>
                </div>

                <div id="timestamp" class="timestamp-div"></div>
            </div>
            </div>
        </div>

        <!-- 右カラム（新）：印刷待ちリストエリア -->
        <div id="print-queue-section" class="queue-section">
            <h3>印刷待ちリスト (<span id="queue-count">0</span>件)</h3>
            <div class="queue-actions">
                <button type="button" id="batch-print-button" class="action-button primary-button" disabled>すべて印刷</button>
                <button type="button" id="clear-queue-button" class="action-button danger-button" disabled>リストをクリア</button>
            </div>
            <ul id="print-queue-list"></ul>
        </div>
    </div>

    <div id="print-batch-container"></div>

    <script src="script.js"></script>
</body>
</html>
